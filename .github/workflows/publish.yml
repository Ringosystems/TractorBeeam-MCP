name: Publish container image

# Publishes the container image on every GitHub Release.
#   - GitHub Container Registry (GHCR): always, using the built-in GITHUB_TOKEN.
#   - Docker Hub: only if the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets
#     are set (Settings -> Secrets and variables -> Actions).
# Trigger manually any time with: gh workflow run publish.yml

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/ringosystems/tractorbeeam365-mcp
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # --- GHCR (always) -------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR metadata (tags + labels)
        id: ghcr_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.ghcr_meta.outputs.tags }}
          labels: ${{ steps.ghcr_meta.outputs.labels }}
          provenance: false

      # --- Docker Hub (only when the secret is configured) ---------------------
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub metadata (tags + labels)
        id: dh_meta
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.dh_meta.outputs.tags }}
          labels: ${{ steps.dh_meta.outputs.labels }}
          provenance: false
